services:
  otp:
    image: opentripplanner/opentripplanner:2.6_latest
    ports:
      - "8080:8080"
    volumes:
      - ./otp-data:/var/opentripplanner
    command: ["--load", "--serve"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/otp/actuators/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s  # OTP cold start can take 60s+
